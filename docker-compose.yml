version: "3.9"

services:
  brasa-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brasa_pizzeria
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Access the site at: http://localhost:8080
