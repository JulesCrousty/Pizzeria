server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # Cache static assets
    location ~* \.(css|js|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # SEO files
    location = /robots.txt  { root /usr/share/nginx/html; access_log off; }
    location = /sitemap.xml { root /usr/share/nginx/html; access_log off; }

    # SPA fallback (serves index.html for all paths)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hide nginx version
    server_tokens off;
}
